<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CentangIn - Modern To-Do-List</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- navbar -->
     <div class="container-navbar">
        <nav>
            <h2 class="nav-logo">Centang<span>In</span></h2>  
            <div class="nav-links" id="navLinks">
                <ul>
                    <li class="active">Tasks</li>
                    <li>Categories</li>
                    <li>Insights</li>
                </ul>
            </div>
            <button class="hamburger" id="hamburgerBtn">
                <i data-lucide="menu"></i>
            </button>
        </nav> 
    </div>  
    <!-- navbar end -->

    <!-- content -->
    <div class="container-content">
        <div class="title">
            <h1>Centang<b>In</b></h1>
            <p>"Satu centang, Selangkah Lebih Dekat dengan Impianmu."</p>
        </div>

        <div class="input-group">
            <p>My Task</p>
            <div class="input-wrapper">
                <input type="text" id="taskInput" placeholder="Tambah kegiatan baru">
                <button onclick="addTask()" class="btn-tambah" title="Tambah Tugas">
                <i data-lucide="plus"></i>
            </div>
        </div>

        <ul id="taskList"></ul>
    </div>
    <!-- end content -->


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
